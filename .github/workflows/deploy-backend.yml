name: Deploy Backend to Production

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: himalayan_trader
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Download dependencies
        run: go mod download -C backend

      - name: Run tests
        run: go test ./... -C backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/himalayan_trader?sslmode=disable

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t himalayan-trader-api:${{ github.sha }} .

      - name: Push to Docker registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag himalayan-trader-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/himalayan-trader-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/himalayan-trader-api:latest

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment command here
          # Example: deploy to Railway, Render, or self-hosted
